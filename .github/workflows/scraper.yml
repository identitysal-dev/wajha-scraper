name: Wajha Attractions Scraper

on:
  schedule:
    # UAE is UTC+4. Run at 4:00 UTC (8am UAE) and 16:00 UTC (8pm UAE)
    - cron: "0 4 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
        run: |
          python scraper/scraper.py

      - name: Upload scrape log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-error-log
          path: scraper/*.log
          retention-days: 7
